<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOOSHYTA Developer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d1117;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
}

#logo{
    position:absolute;
    font-size:90px;
    color:white;
    font-weight:bold;
    letter-spacing:8px;
    text-shadow:0 0 20px #00bfff;
    animation:fadeIn 2s forwards;
}

#welcome{
    position:absolute;
    text-align:center;
    opacity:0;
}

#welcome h1{
    color:white;
    font-size:55px;
}

#welcome p{
    margin-top:15px;
    color:#9ecfff;
    font-size:22px;
}

.fadeOut{
    animation:fadeOut 1.5s forwards;
}

.fadeIn{
    animation:welcomeIn 2s forwards;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:scale(.5);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes fadeOut{
    from{
        opacity:1;
        transform:scale(1);
    }
    to{
        opacity:0;
        transform:scale(1.3);
    }
}

@keyframes welcomeIn{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>
<body>

<div id="logo">
    TOOSHYTA
</div>

<div id="welcome">
    <h1>Welcome to the TOOSHYTA Developer Website</h1>
    <p>Building the Future with Creativity</p>
</div>

<script>
setTimeout(function(){

document.getElementById("logo").classList.add("fadeOut");

setTimeout(function(){
document.getElementById("logo").style.display="none";
document.getElementById("welcome").classList.add("fadeIn");
},1500);

},6000);
</script>

</body>
</html>
