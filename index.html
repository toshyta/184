<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOOSHYTA</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
    overflow:hidden;
}

h1{
    font-family:Arial, Helvetica, sans-serif;
    font-size:90px;
    font-weight:900;
    color:white;
    letter-spacing:12px;
    text-transform:uppercase;

    opacity:0;
    transform:translateY(50px) scale(0.8);

    text-shadow:
        0 0 10px rgba(255,255,255,.4),
        0 0 20px rgba(0,170,255,.5),
        0 0 40px rgba(0,170,255,.4);

    animation:showTitle 2.5s ease-out forwards,
               glow 3s ease-in-out infinite alternate;
}

@keyframes showTitle{
    0%{
        opacity:0;
        transform:translateY(50px) scale(0.8);
    }
    60%{
        opacity:1;
    }
    100%{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

@keyframes glow{
    from{
        text-shadow:
        0 0 10px #00bfff,
        0 0 20px #00bfff,
        0 0 40px #00bfff;
    }

    to{
        text-shadow:
        0 0 20px #ffffff,
        0 0 40px #4fc3f7,
        0 0 80px #4fc3f7;
    }
}
</style>

</head>
<body>

<h1>TOOSHYTA</h1>

</body>
</html>
