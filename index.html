<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOOSHYTA Developer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#0a0f1f,#111827,#1e293b);
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

#logo{
    position:absolute;
    color:#fff;
    font-size:90px;
    font-weight:bold;
    letter-spacing:10px;
    text-shadow:0 0 15px #00c8ff,0 0 35px #00c8ff;
    animation:showLogo 2s ease forwards;
}

#welcome{
    position:absolute;
    text-align:center;
    opacity:0;
}

#welcome h1{
    color:white;
    font-size:52px;
    margin-bottom:20px;
}

#welcome p{
    color:#8fd3ff;
    font-size:24px;
    letter-spacing:2px;
}

@keyframes showLogo{
    from{
        opacity:0;
        transform:scale(.6);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes hideLogo{
    from{
        opacity:1;
        transform:scale(1);
    }
    to{
        opacity:0;
        transform:scale(1.3);
    }
}

@keyframes showWelcome{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div id="logo">TOOSHYTA</div>

<div id="welcome">
    <h1>Welcome to the TOOSHYTA Developer Website</h1>
    <p>Developed by TOOSHYTA</p>
</div>

<script>
setTimeout(function(){
    document.getElementById("logo").style.animation="hideLogo 1.5s forwards";

    setTimeout(function(){
        document.getElementById("logo").style.display="none";
        document.getElementById("welcome").style.animation="showWelcome 2s forwards";
        document.getElementById("welcome").style.opacity="1";
    },1500);

},6000);
</script>

</body>
</html>
